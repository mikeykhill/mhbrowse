<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>MHBrowse</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/golden-layout@1.5.9/dist/goldenlayout.min.js"></script>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/golden-layout@1.5.9/src/css/goldenlayout-base.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/golden-layout@1.5.9/src/css/goldenlayout-dark-theme.css">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="app-container">
    <div id="sidebar">
      <div id="update-indicator">
        <div class="status-dot"></div>
        <span id="update-text">Up to date</span>
        <button id="restart-update-btn" style="display: none;">Restart to Update</button>
      </div>
      <button id="sidebar-toggle" title="Toggle Sidebar" class="manage-btn" style="align-self: flex-start; margin-bottom: 20px; padding: 6px; width: 32px; height: 32px; display: flex; justify-content: center; align-items: center;">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="3" y1="12" x2="21" y2="12"></line><line x1="3" y1="6" x2="21" y2="6"></line><line x1="3" y1="18" x2="21" y2="18"></line></svg>
      </button>
      <div class="brand">
        <div class="brand-dot"></div>
        <span class="brand-text">M365 Admin</span>
      </div>

      <div class="nav-group" style="background: transparent; padding: 0;">
        <button id="add-pane-btn" class="manage-btn" style="width: 100%; justify-content: center; font-size: 13px; padding: 10px; background: rgba(139, 92, 246, 0.2); color: white; border: 1px solid rgba(139, 92, 246, 0.4);">
          ➕ Add Workspace Pane
        </button>
      </div>
      
      <div class="address-container">
        <div class="tenant-header">
          <div class="address-label">Select Tenant</div>
          <button id="manage-tenants-btn" class="manage-btn" title="Manage Tenants">⚙️ Manage Tenants</button>
        </div>
        <select id="tenant-picker"></select>
      </div>
      
      <div class="address-container">
        <div class="address-label">Primary Address</div>
        <input type="text" id="primary-address" value="https://admin.microsoft.com" placeholder="Enter URL or search">
      </div>

      <div class="portals-section">
        <div class="section-title">Admin Portals</div>
        <button class="portal-btn" data-url="https://admin.microsoft.com">M365 Admin Center</button>
        <button class="portal-btn" data-url="https://entra.microsoft.com">Entra ID</button>
        <button class="portal-btn" data-url="https://admin.exchange.microsoft.com">Exchange Admin</button>
        <button class="portal-btn" data-url="https://admin.teams.microsoft.com">Teams Admin</button>
        <button class="portal-btn" data-url="https://partner.microsoft.com/dashboard">Partner Center</button>
      </div>
    </div>
    
    <div id="workspace"></div>
  </div>

  <div id="tenant-modal" class="modal hidden">
    <div class="modal-content">
      <div class="modal-header">
        <h2>Manage Tenants</h2>
      </div>
      
      <div class="tenant-list-container">
        <h3>Existing Tenants</h3>
        <ul id="modal-tenant-list"></ul>
      </div>

      <div class="add-tenant-form">
        <h3>Add New Tenant</h3>
        <input type="text" id="new-tenant-name" placeholder="Display Name (e.g., Contoso IT)">
        <input type="text" id="new-tenant-email" placeholder="Admin Email">
        <input type="text" id="new-tenant-id" placeholder="Short ID (e.g., contoso)">
        <button id="add-tenant-btn">Add Tenant</button>
      </div>

      <div class="modal-footer">
        <button id="close-modal-btn">Close</button>
      </div>
    </div>
  </div>

  <script src="renderer.js"></script>
</body>
</html>
